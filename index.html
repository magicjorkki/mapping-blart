<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapping Blart</title>
    <link rel="icon" type="image/x-icon" href="web_data/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="main-div">
      <div class="sidebar">
        <img src="web_data/blart.png" id="blart-img" />

        <div class="control-group">
          <h2>Map style</h2>
          <select id="map-selector">
            <option value="satellite">Satellite (Esri)</option>
            <option value="osm">OpenStreetMap</option>
          </select>
        </div>

        <div class="control-group">
          <h2>Area visualization</h2>
          <select id="area-selector">
            <option value="none">None</option>
            <option value="search_areas">Search Areas</option>
            <!--<option value="districts">Joensuu Districts</option>-->
          </select>
        </div>

        <div class="control-group">
          <h2>Point visualization</h2>
          <select id="point-coloring-selector">
            <option value="main_col">Main Color (Default)</option>
            <option value="simple">Simple</option>
            <option value="blart_txt">Has Blart Text</option>
            <option value="eyes">Has Eyes</option>
            <option value="nose">Has Nose</option>
            <option value="simpson">Has Simpson Design</option>
            <option value="not_spray">Is Not Spray</option>
            <option value="private_prop">Private Property</option>
            <option value="view_direction">View Direction</option>
          </select>
        </div>

        <div class="control-group" id="legend-container">
          <div id="legend-content"></div>
        </div>

        <div
          class="toggle-container"
          onclick="document.getElementById('unsure-toggle').click()"
        >
          <div class="switch">
            <input
              type="checkbox"
              id="unsure-toggle"
              onclick="event.stopPropagation()"
            />
            <span class="slider"></span>
          </div>
          <div class="toggle-text">Show Unsure points</div>
        </div>
      </div>

      <div id="mobile-switch-btn" onclick="toggleMenu()">Toggle menu</div>

      <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
